<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales</title>
    <link rel="stylesheet" href="/reseller/statics/app.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav no-print">
        <div>
          <div class="muted">Signed in as</div>
          <div id="nav-email" style="font-weight:700"></div>
        </div>
        <div class="links">
          <a class="btn" href="/reseller/dashboard">Dashboard</a>
          <a class="btn" href="/reseller/buy">Buy vouchers</a>
          <a class="btn" href="/reseller/vouchers">My vouchers</a>
          <a class="btn" href="/reseller/wallet">Wallet</a>
          <button class="btn danger" onclick="ResellerApp.logout()">Logout</button>
        </div>
      </div>

      <div class="card">
        <h1 class="h1">Sales</h1>
        <div class="muted">This month and daily trend (past 30 days).</div>
      </div>

      <div class="spacer"></div>
      <div class="grid cols-3">
        <div class="card">
          <div class="muted">Sold (this month)</div>
          <div id="sold" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Total value (GHS)</div>
          <div id="value" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Commission earned (GHS)</div>
          <div id="commission" class="big">—</div>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="card">
        <div class="muted">Daily sales count (30 days)</div>
        <div class="spacer"></div>
        <canvas id="chart" width="900" height="240" style="width:100%;height:auto;border:1px solid var(--border);border-radius:12px;background:#0b1430"></canvas>
      </div>
    </div>

    <script src="/reseller/statics/app.js"></script>
    <script>
      ResellerApp.requireAuth();
      ResellerApp.loadNav();

      function draw(series){
        const c = document.getElementById("chart");
        const ctx = c.getContext("2d");
        const w = c.width, h = c.height;
        ctx.clearRect(0,0,w,h);
        const pad = 24;
        const max = Math.max(1, ...series.map(x => x.count));

        // axes
        ctx.strokeStyle = "rgba(148,163,184,.35)";
        ctx.beginPath();
        ctx.moveTo(pad, pad);
        ctx.lineTo(pad, h-pad);
        ctx.lineTo(w-pad, h-pad);
        ctx.stroke();

        // bars
        const barW = (w - pad*2) / series.length;
        series.forEach((p, i) => {
          const x = pad + i*barW + 1;
          const bh = (h - pad*2) * (p.count / max);
          const y = (h - pad) - bh;
          ctx.fillStyle = "rgba(34,197,94,.85)";
          ctx.fillRect(x, y, Math.max(1, barW-2), bh);
        });

        ctx.fillStyle = "rgba(148,163,184,.8)";
        ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.fillText("0", 6, h-pad+4);
        ctx.fillText(String(max), 6, pad+4);
      }

      (async () => {
        const summary = await ResellerApp.API.request("/api/v1/reseller/sales/summary");
        document.getElementById("sold").textContent = String(summary.sold_count);
        document.getElementById("value").textContent = ResellerApp.money(summary.total_value_ghs);
        document.getElementById("commission").textContent = ResellerApp.money(summary.commission_earned_ghs);

        const daily = await ResellerApp.API.request("/api/v1/reseller/sales/daily?days=30");
        draw(daily);
      })().catch(() => window.location.href="/reseller/login");
    </script>
  </body>
</html>
