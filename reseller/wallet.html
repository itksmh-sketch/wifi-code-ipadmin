<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wallet</title>
    <link rel="stylesheet" href="/reseller/statics/app.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav no-print">
        <div>
          <div class="muted">Signed in as</div>
          <div id="nav-email" style="font-weight:700"></div>
        </div>
        <div class="links">
          <a class="btn" href="/reseller/dashboard">Dashboard</a>
          <a class="btn" href="/reseller/buy">Buy vouchers</a>
          <a class="btn" href="/reseller/vouchers">My vouchers</a>
          <a class="btn" href="/reseller/sales">Sales</a>
          <button class="btn danger" onclick="ResellerApp.logout()">Logout</button>
        </div>
      </div>

      <div class="card">
        <h1 class="h1">Wallet</h1>
        <div class="muted">Balance and transaction history.</div>
      </div>

      <div class="spacer"></div>
      <div class="grid cols-3">
        <div class="card">
          <div class="muted">Current balance (GHS)</div>
          <div id="balance" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Lifetime topped up (GHS)</div>
          <div id="topup" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Lifetime spent (GHS)</div>
          <div id="spent" class="big">—</div>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Balance after</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
        <div class="spacer"></div>
        <div class="row no-print">
          <button class="btn" id="prev">Prev</button>
          <button class="btn" id="next">Next</button>
        </div>
      </div>
    </div>

    <script src="/reseller/statics/app.js"></script>
    <script>
      ResellerApp.requireAuth();
      ResellerApp.loadNav();

      let offset = 0;
      const limit = 20;

      function fmtDate(s){
        if (!s) return "—";
        try { return new Date(s).toLocaleString(); } catch { return s; }
      }

      async function load(){
        const wallet = await ResellerApp.API.request("/api/v1/reseller/wallet");
        document.getElementById("balance").textContent = ResellerApp.money(wallet.balance_ghs);
        document.getElementById("topup").textContent = ResellerApp.money(wallet.lifetime_topped_up_ghs);
        document.getElementById("spent").textContent = ResellerApp.money(wallet.lifetime_spent_ghs);

        const txs = await ResellerApp.API.request(`/api/v1/reseller/wallet/transactions?limit=${limit}&offset=${offset}`);
        const body = document.getElementById("txBody");
        body.innerHTML = txs.map(t => `
          <tr>
            <td>${fmtDate(t.created_at)}</td>
            <td><span class="pill">${t.type}</span></td>
            <td>${ResellerApp.money(t.amount_ghs)}</td>
            <td>${ResellerApp.money(t.balance_after_ghs)}</td>
            <td>${t.description || ""}</td>
          </tr>
        `).join("");
      }

      document.getElementById("prev").addEventListener("click", () => {
        offset = Math.max(0, offset - limit);
        load();
      });
      document.getElementById("next").addEventListener("click", () => {
        offset += limit;
        load();
      });

      load().catch(() => window.location.href="/reseller/login");
    </script>
  </body>
</html>
