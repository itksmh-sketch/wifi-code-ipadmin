<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reseller Dashboard</title>
    <link rel="stylesheet" href="/reseller/statics/app.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav no-print">
        <div>
          <div class="muted">Signed in as</div>
          <div id="nav-email" style="font-weight:700"></div>
        </div>
        <div class="links">
          <a class="btn" href="/reseller/dashboard">Dashboard</a>
          <a class="btn" href="/reseller/buy">Buy vouchers</a>
          <a class="btn" href="/reseller/vouchers">My vouchers</a>
          <a class="btn" href="/reseller/wallet">Wallet</a>
          <a class="btn" href="/reseller/sales">Sales</a>
          <button class="btn danger" onclick="ResellerApp.logout()">Logout</button>
        </div>
      </div>

      <div class="card">
        <h1 class="h1">Dashboard</h1>
        <div class="muted">Your wallet and sales overview.</div>
      </div>

      <div class="spacer"></div>

      <div class="grid cols-3">
        <div class="card">
          <div class="muted">Wallet balance (GHS)</div>
          <div id="balance" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Vouchers allocated (this month)</div>
          <div id="alloc-month" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Vouchers sold (this month)</div>
          <div id="sold-month" class="big">—</div>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="grid cols-2">
        <div class="card">
          <div class="muted">Commission earned (this month)</div>
          <div id="commission" class="big">—</div>
        </div>
        <div class="card">
          <div class="muted">Total value sold (this month)</div>
          <div id="total-sold" class="big">—</div>
        </div>
      </div>
    </div>

    <script src="/reseller/statics/app.js"></script>
    <script>
      ResellerApp.requireAuth();
      ResellerApp.loadNav();

      const startOfMonth = () => {
        const d = new Date();
        return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1, 0, 0, 0));
      };

      (async () => {
        const wallet = await ResellerApp.API.request("/api/v1/reseller/wallet");
        document.getElementById("balance").textContent = ResellerApp.money(wallet.balance_ghs);

        const summary = await ResellerApp.API.request("/api/v1/reseller/sales/summary");
        document.getElementById("commission").textContent = ResellerApp.money(summary.commission_earned_ghs);
        document.getElementById("total-sold").textContent = ResellerApp.money(summary.total_value_ghs);
        document.getElementById("sold-month").textContent = String(summary.sold_count);

        const vouchers = await ResellerApp.API.request("/api/v1/reseller/vouchers");
        const som = startOfMonth();
        const allocMonth = vouchers.filter(v => v.allocated_at && new Date(v.allocated_at) >= som).length;
        document.getElementById("alloc-month").textContent = String(allocMonth);
      })().catch(() => {
        window.location.href = "/reseller/login";
      });
    </script>
  </body>
</html>
