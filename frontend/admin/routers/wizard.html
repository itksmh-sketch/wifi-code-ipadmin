<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Router</title>
  <style>
    :root { --bg:#fff9f0; --ink:#172033; --muted:#5f6c86; --line:#d9dfeb; --accent:#0b6e4f; --accent-2:#f59e0b; --danger:#b42318; --card:#ffffff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Segoe UI, Arial, sans-serif; background:radial-gradient(circle at top,#fff4d8,#f5f7fb 40%,#eef2f8 100%); color:var(--ink); }
    .wrap { max-width:980px; margin:0 auto; padding:24px 16px 48px; }
    .steps { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
    .step { padding:12px; border-radius:14px; border:1px solid var(--line); background:#fff; color:var(--muted); font-size:13px; }
    .step.active { border-color:var(--accent); color:var(--ink); box-shadow:0 8px 24px rgba(11,110,79,.12); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:24px; box-shadow:0 16px 36px rgba(23,32,51,.08); }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; }
    input, select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line); }
    .actions { margin-top:20px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .btn { border:0; border-radius:12px; padding:12px 16px; font-weight:700; cursor:pointer; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-secondary { background:#eef2f7; color:var(--ink); }
    .btn-warning { background:var(--accent-2); color:#1f2937; }
    .status { margin-top:12px; padding:12px 14px; border-radius:12px; background:#f8fafc; color:var(--muted); }
    .log { margin-top:18px; padding-left:18px; }
    .log li { margin:8px 0; }
    .hidden { display:none; }
    .summary { background:#f8fafc; border:1px dashed var(--line); border-radius:14px; padding:14px; margin-top:14px; }
    @media (max-width: 720px) { .steps, .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="steps">
      <div class="step active" data-step="1">1. Basic info</div>
      <div class="step" data-step="2">2. API connection</div>
      <div class="step" data-step="3">3. Hotspot config</div>
      <div class="step" data-step="4">4. Provision</div>
    </div>
    <div class="card">
      <div id="step-1">
        <div class="grid">
          <div><label>Router name</label><input id="router-name"></div>
          <div><label>Site</label><select id="site-id"></select></div>
          <div><label>NAS identifier</label><input id="nas-identifier"></div>
          <div><label>NAS shared secret</label><input id="nas-secret"></div>
        </div>
      </div>
      <div id="step-2" class="hidden">
        <div class="grid">
          <div><label>Router IP address</label><input id="router-ip" placeholder="192.168.99.99"></div>
          <div><label>API port</label><input id="api-port" type="number" value="8728"></div>
          <div><label>RouterOS username</label><input id="api-username" value="admin"></div>
          <div><label>RouterOS password</label><input id="api-password" type="password"></div>
        </div>
        <div class="actions">
          <button class="btn btn-warning" id="test-connection">Test connection</button>
        </div>
        <div id="connection-result" class="status">Test the connection before moving to hotspot setup.</div>
      </div>
      <div id="step-3" class="hidden">
        <div class="grid">
          <div><label>Hotspot interface</label><select id="hotspot-interface"></select></div>
          <div><label>Captive portal DNS name</label><input id="dns-name" placeholder="hotspot.yourisp.com"></div>
          <div><label>Config template</label><select id="template-id"><option value="">No template</option></select></div>
        </div>
        <div class="summary" id="summary"></div>
      </div>
      <div id="step-4" class="hidden">
        <p>Provisioning starts as soon as you confirm. The page polls the live provision log every 2 seconds.</p>
        <button class="btn btn-primary" id="provision-router">Provision router</button>
        <ul id="progress-log" class="log"></ul>
        <div id="completion" class="status hidden"></div>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="back-btn">Back</button>
        <button class="btn btn-primary" id="next-btn">Next</button>
      </div>
    </div>
  </div>
  <script>
    const state = { step: 1, tested: false, logId: null, routerId: null, interfaces: [] };
    function token() { return localStorage.getItem('access_token'); }
    async function api(path, options = {}) {
      const res = await fetch('/api/v1' + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token(), ...(options.headers || {}) }
      });
      if (res.status === 401) {
        location.href = '/admin/login?next=' + encodeURIComponent(location.pathname + location.search);
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error((await res.text()).replace(/^\"|\"$/g, ''));
      return res.status === 204 ? null : res.json();
    }
    function secret() { return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); }
    function slug(value) { return value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
    function setStep(step) {
      state.step = step;
      document.querySelectorAll('.step').forEach((el) => el.classList.toggle('active', Number(el.dataset.step) === step));
      [1,2,3,4].forEach((idx) => document.getElementById('step-' + idx).classList.toggle('hidden', idx !== step));
      document.getElementById('back-btn').disabled = step === 1;
      document.getElementById('next-btn').classList.toggle('hidden', step === 4);
    }
    function formData() {
      return {
        site_id: document.getElementById('site-id').value,
        name: document.getElementById('router-name').value.trim(),
        nas_identifier: document.getElementById('nas-identifier').value.trim(),
        nas_secret: document.getElementById('nas-secret').value.trim(),
        ip_address: document.getElementById('router-ip').value.trim(),
        api_port: Number(document.getElementById('api-port').value || 8728),
        api_username: document.getElementById('api-username').value.trim(),
        api_password: document.getElementById('api-password').value,
        dns_name: document.getElementById('dns-name').value.trim(),
        hotspot_interface: document.getElementById('hotspot-interface').value,
        template_id: document.getElementById('template-id').value || null
      };
    }
    function validateCurrentStep() {
      const data = formData();
      if (state.step === 1 && (!data.name || !data.site_id || !data.nas_identifier || !data.nas_secret)) throw new Error('Fill in router name, site, NAS identifier, and NAS secret.');
      if (state.step === 2 && (!data.ip_address || !data.api_username || !data.api_password)) throw new Error('Fill in the API connection fields.');
      if (state.step === 3 && (!state.tested || !data.hotspot_interface || !data.dns_name)) throw new Error('Test the connection successfully, then choose the hotspot interface and DNS name.');
    }
    async function loadSites() {
      const sites = await api('/admin/sites');
      const select = document.getElementById('site-id');
      select.innerHTML = '<option value="">Choose site</option>' + sites.map((site) => `<option value="${site.id}">${site.town_name} - ${site.name}</option>`).join('');
    }
    async function loadTemplates() {
      const templates = await api('/admin/config-templates');
      const select = document.getElementById('template-id');
      select.innerHTML = '<option value="">No template</option>' + templates.map((tpl) => `<option value="${tpl.id}">${tpl.name}</option>`).join('');
    }
    async function testConnection() {
      const data = formData();
      const result = await api('/admin/routers/test-connection', { method: 'POST', body: JSON.stringify({ host: data.ip_address, port: data.api_port, username: data.api_username, password: data.api_password, use_ssl: false }) });
      const box = document.getElementById('connection-result');
      if (!result.success) {
        state.tested = false;
        box.textContent = 'Connection failed: ' + (result.error || 'Unknown error');
        return;
      }
      const interfaces = await api('/admin/routers/temp-interfaces', { method: 'POST', body: JSON.stringify({ host: data.ip_address, port: data.api_port, username: data.api_username, password: data.api_password, use_ssl: false }) });
      state.interfaces = interfaces;
      state.tested = true;
      box.textContent = `Connected: ${result.board_name || 'MikroTik'} running RouterOS ${result.ros_version || 'unknown'}`;
      document.getElementById('hotspot-interface').innerHTML = interfaces.map((iface) => `<option value="${iface.name}">${iface.name}</option>`).join('');
      await loadTemplates();
      updateSummary();
    }
    function updateSummary() {
      const data = formData();
      document.getElementById('summary').innerHTML = `
        <strong>Provision summary</strong><br>
        Router: ${data.name || '-'}<br>
        NAS: ${data.nas_identifier || '-'}<br>
        IP: ${data.ip_address || '-'}<br>
        Interface: ${data.hotspot_interface || '-'}<br>
        DNS: ${data.dns_name || '-'}
      `;
    }
    async function provision() {
      const data = formData();
      const result = await api('/admin/routers/onboard', { method: 'POST', body: JSON.stringify(data) });
      state.logId = result.log_id;
      state.routerId = result.router_id;
      pollLog();
    }
    async function pollLog() {
      if (!state.logId || !state.routerId) return;
      const body = await api(`/admin/routers/${state.routerId}/provision-status/${state.logId}`);
      const log = document.getElementById('progress-log');
      log.innerHTML = body.commands_executed.map((entry) => `<li>${entry.status === 'failed' ? 'x' : entry.status === 'success' ? 'ok' : '...'} ${entry.message || entry.command || entry.step || entry.path || 'update'}${entry.error ? ' - ' + entry.error : ''}</li>`).join('');
      if (body.status === 'failed' || body.status === 'success') {
        const completion = document.getElementById('completion');
        completion.hidden = false;
        completion.textContent = body.status === 'success' ? 'Provisioning complete. Open the router detail page.' : 'Provisioning failed: ' + (body.error_message || 'Unknown error');
        if (body.status === 'success') completion.innerHTML += ` <a href="/admin/routers/${state.routerId}">View router</a>`;
        return;
      }
      setTimeout(pollLog, 2000);
    }
    document.getElementById('router-name').addEventListener('input', (event) => {
      document.getElementById('nas-identifier').value = slug(event.target.value);
      updateSummary();
    });
    document.getElementById('nas-secret').value = secret();
    document.getElementById('test-connection').addEventListener('click', () => testConnection().catch((err) => { document.getElementById('connection-result').textContent = err.message; }));
    document.getElementById('next-btn').addEventListener('click', () => { try { validateCurrentStep(); setStep(Math.min(4, state.step + 1)); updateSummary(); } catch (err) { alert(err.message); } });
    document.getElementById('back-btn').addEventListener('click', () => setStep(Math.max(1, state.step - 1)));
    document.getElementById('provision-router').addEventListener('click', () => provision().catch((err) => { document.getElementById('completion').hidden = false; document.getElementById('completion').textContent = err.message; }));
    ['dns-name','hotspot-interface','router-ip'].forEach((id) => document.getElementById(id).addEventListener('input', updateSummary));
    loadSites().catch((err) => alert(err.message));
  </script>
</body>
</html>
