<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routers</title>
  <style>
    :root { --bg:#f5f7fb; --card:#ffffff; --ink:#14213d; --muted:#5c677d; --line:#d7deea; --accent:#0d6e5f; --danger:#b42318; --ok:#067647; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Segoe UI, Arial, sans-serif; background:linear-gradient(180deg,#f2f6fb 0,#eef2f8 100%); color:var(--ink); }
    .wrap { max-width:1200px; margin:0 auto; padding:24px 16px 48px; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:20px; }
    .hero h1 { margin:0; font-size:32px; }
    .hero p { margin:6px 0 0; color:var(--muted); }
    .btn { border:0; border-radius:12px; padding:12px 16px; font-weight:600; cursor:pointer; }
    .btn-primary { background:var(--accent); color:#fff; text-decoration:none; display:inline-block; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 12px 32px rgba(20,33,61,.06); }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:14px 16px; border-bottom:1px solid var(--line); text-align:left; font-size:14px; }
    th { background:#f8fafc; color:var(--muted); font-weight:700; }
    tr:last-child td { border-bottom:0; }
    .router-link { color:var(--ink); text-decoration:none; font-weight:600; }
    .dot { width:10px; height:10px; border-radius:999px; display:inline-block; margin-right:8px; }
    .dot.ok { background:#12b76a; }
    .dot.off { background:#f04438; }
    .badge { border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; display:inline-block; background:#eef4ff; color:#175cd3; }
    .empty { padding:24px; color:var(--muted); }
    @media (max-width: 720px) {
      .hero { flex-direction:column; align-items:flex-start; }
      table, thead, tbody, th, td, tr { display:block; }
      thead { display:none; }
      tr { border-bottom:1px solid var(--line); padding:8px 0; }
      td { border:0; padding:8px 16px; }
      td::before { content:attr(data-label); display:block; color:var(--muted); font-size:12px; margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Router Fleet</h1>
        <p>See live reachability, last contact time, and jump into provisioning or troubleshooting.</p>
      </div>
      <a class="btn btn-primary" href="/admin/routers/new">Add router</a>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Site</th>
            <th>IP Address</th>
            <th>NAS Identifier</th>
            <th>Online</th>
            <th>Connection Status</th>
            <th>Last Seen</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty" hidden>No routers found.</div>
    </div>
  </div>
  <script>
    function token() { return localStorage.getItem('access_token'); }
    async function api(path, options = {}) {
      const res = await fetch('/api/v1' + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token(), ...(options.headers || {}) }
      });
      if (res.status === 401) {
        location.href = '/admin/login?next=' + encodeURIComponent(location.pathname + location.search);
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.status === 204 ? null : res.json();
    }
    function fmt(value) { return value ? new Date(value).toLocaleString() : 'Never'; }
    function render(rows) {
      const tbody = document.getElementById('rows');
      const empty = document.getElementById('empty');
      tbody.innerHTML = '';
      if (!rows.length) { empty.hidden = false; return; }
      empty.hidden = true;
      rows.forEach((row) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td data-label="Name"><a class="router-link" href="/admin/routers/${row.id}">${row.name}</a></td>
          <td data-label="Site">${row.site_name}</td>
          <td data-label="IP Address"><code>${row.ip_address}</code></td>
          <td data-label="NAS Identifier"><code>${row.nas_identifier}</code></td>
          <td data-label="Online"><span class="dot ${row.is_online ? 'ok' : 'off'}"></span>${row.is_online ? 'Online' : 'Offline'}</td>
          <td data-label="Connection Status"><span class="badge">${row.connection_status || 'unknown'}</span></td>
          <td data-label="Last Seen">${fmt(row.last_connected_at || row.last_seen_at)}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    const params = new URLSearchParams(location.search);
    const siteId = params.get('site_id');
    const routersPath = siteId ? `/sites/${encodeURIComponent(siteId)}/routers` : '/admin/routers';
    api(routersPath).then(render).catch((err) => { document.getElementById('empty').hidden = false; document.getElementById('empty').textContent = 'Failed to load routers: ' + err.message; });
  </script>
</body>
</html>
