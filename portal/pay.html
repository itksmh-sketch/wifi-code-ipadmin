<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay - ISP Hotspot</title>
    <link rel="stylesheet" href="/portal/statics/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Buy access</h1>
            <p class="subtitle">Pay with card or mobile money to receive a voucher code</p>

            <div id="topError" class="alert alert-error" style="display:none"></div>
            <div id="statusBanner" class="muted" style="display:none;margin-bottom:12px"></div>

            <div id="planCard" class="plan-card" style="display:none"></div>
            <div id="planLoading" class="muted">Loading plan...</div>

            <form id="payForm" style="margin-top:16px">
                <div class="form-group">
                    <label for="phone">Mobile money number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 0244123456" required>
                </div>

                <div class="form-group">
                    <label>Network</label>
                    <div class="radio-list">
                        <label class="radio-item"><input type="radio" name="method" value="mtn_momo" checked> MTN MoMo</label>
                        <label class="radio-item"><input type="radio" name="method" value="vodafone_cash"> Telecel Cash</label>
                        <label class="radio-item"><input type="radio" name="method" value="airteltigo"> AirtelTigo Cash</label>
                        <label class="radio-item"><input type="radio" name="method" value="card"> Card</label>
                    </div>
                </div>

                <button id="submitBtn" type="submit" class="btn btn-primary" disabled>Start payment</button>
            </form>

            <form id="followupForm" style="display:none;margin-top:16px">
                <div id="followupFields"></div>
                <button id="followupBtn" type="submit" class="btn btn-primary">Continue</button>
            </form>

            <button id="tryAgainBtn" type="button" class="btn btn-outline" style="display:none;margin-top:12px">Start over</button>

            <div id="waitBox" class="muted" style="display:none;margin-top:12px">
                <span class="spinner"></span>
                <span id="waitText">Waiting for payment confirmation...</span>
            </div>
        </div>
    </div>

    <script>
    (function(){
        var planId = "{{ plan_id }}";
        var siteId = "{{ site_id }}";
        var gateway = "{{ gateway or '' }}";
        var rt = "{{ rt or '' }}";
        var internalReference = null;
        var polling = null;
        var selectedPlan = null;

        function qs(id){ return document.getElementById(id); }
        function showError(msg){
            var el = qs("topError");
            el.style.display = "flex";
            el.textContent = msg;
        }
        function clearError(){
            var el = qs("topError");
            el.style.display = "none";
            el.textContent = "";
        }
        function showBanner(msg){
            var el = qs("statusBanner");
            if(!msg){
                el.style.display = "none";
                el.textContent = "";
                return;
            }
            el.style.display = "block";
            el.textContent = msg;
        }
        function fmtSpeed(kbps){ var mbps=(kbps||0)/1000; return (mbps%1===0?mbps.toFixed(0):mbps.toFixed(1))+" Mbps"; }
        function fmtCap(p){
            var parts=[];
            if ((p.type==="time"||p.type==="hybrid") && p.duration_minutes){
                var m=p.duration_minutes;
                parts.push((m>=60 && m%60===0)?((m/60)+" hrs"):(m+" mins"));
            }
            if ((p.type==="data"||p.type==="hybrid") && p.data_limit_mb){
                var mb=p.data_limit_mb;
                parts.push((mb>=1024 && mb%1024===0)?((mb/1024)+" GB"):(mb>=1024?((mb/1024).toFixed(1)+" GB"):(mb+" MB")));
            }
            return parts.join(" + ");
        }
        function stopPolling(){
            if(polling){ clearInterval(polling); polling = null; }
        }
        function setBusy(busy){
            qs("submitBtn").disabled = busy || !selectedPlan;
            qs("phone").disabled = busy || selectedMethod() === "card";
            var radios = document.querySelectorAll('input[name="method"]');
            for(var i=0;i<radios.length;i++) radios[i].disabled = busy;
        }
        function resetState(){
            stopPolling();
            internalReference = null;
            clearError();
            showBanner("");
            qs("followupForm").style.display = "none";
            qs("followupFields").innerHTML = "";
            qs("waitBox").style.display = "none";
            qs("tryAgainBtn").style.display = "none";
            setBusy(false);
        }
        function renderPlan(plans){
            for(var i=0;i<plans.length;i++){ if(String(plans[i].id)===String(planId)) { selectedPlan=plans[i]; break; } }
            if(!selectedPlan) throw new Error("plan_not_found");
            var cap = fmtCap(selectedPlan);
            var speed = fmtSpeed(selectedPlan.download_speed_kbps)+" down / "+fmtSpeed(selectedPlan.upload_speed_kbps)+" up";
            var price = Number(selectedPlan.price_ghs||0).toFixed(2);
            qs("planCard").style.display="block";
            qs("planCard").innerHTML =
                '<div class="plan-name">'+(selectedPlan.name||"Plan")+'</div>'+
                '<div class="plan-meta">'+speed+'</div>'+
                (cap?('<div class="plan-meta">'+cap+'</div>'):'')+
                '<div class="plan-meta"><strong>GHS '+price+'</strong></div>';
            qs("planLoading").style.display="none";
            qs("submitBtn").disabled=false;
            qs("submitBtn").textContent="Pay GHS "+price;
        }
        function renderFollowup(action){
            var container = qs("followupFields");
            var html = "";
            if(action === "enter_otp"){
                html = '<div class="form-group"><label for="otp">OTP</label><input type="text" id="otp" name="otp" placeholder="Enter OTP" required></div>';
            } else if(action === "enter_phone"){
                html = '<div class="form-group"><label for="followupPhone">Phone number</label><input type="tel" id="followupPhone" name="phone" placeholder="Enter phone number" required></div>';
            } else if(action === "enter_pin"){
                html = '<div class="form-group"><label for="pin">PIN</label><input type="password" id="pin" name="pin" placeholder="Enter PIN" required></div>';
            } else if(action === "enter_birthday"){
                html = '<div class="form-group"><label for="birthday">Date of birth</label><input type="text" id="birthday" name="birthday" placeholder="YYYY-MM-DD" required></div>';
            } else if(action === "enter_address"){
                html = '' +
                    '<div class="form-group"><label for="address">Address</label><input type="text" id="address" name="address" required></div>' +
                    '<div class="form-group"><label for="city">City</label><input type="text" id="city" name="city" required></div>' +
                    '<div class="form-group"><label for="state">State</label><input type="text" id="state" name="state" required></div>' +
                    '<div class="form-group"><label for="zip_code">Zip code</label><input type="text" id="zip_code" name="zip_code" required></div>';
            }
            container.innerHTML = html;
            qs("followupForm").style.display = html ? "block" : "none";
        }
        function startPolling(){
            stopPolling();
            polling = setInterval(fetchStatus, 5000);
        }
        function selectedMethod(){
            var methodEl = document.querySelector('input[name="method"]:checked');
            return methodEl ? methodEl.value : "mtn_momo";
        }
        function syncPhoneRequirement(){
            var isCard = selectedMethod() === "card";
            qs("phone").required = !isCard;
            qs("phone").disabled = isCard;
            qs("phone").placeholder = isCard ? "Not required for card" : "e.g. 0244123456";
        }
        function handleState(body){
            clearError();
            showBanner(body.display_message || "");
            if(body.status === "success"){
                stopPolling();
                var target = "/portal/success?ref=" + encodeURIComponent(internalReference || body.internal_reference || "");
                if(gateway) target += "&gateway=" + encodeURIComponent(gateway);
                window.location.href = target;
                return;
            }
            if(body.status === "failed"){
                stopPolling();
                qs("waitBox").style.display = "none";
                qs("followupForm").style.display = "none";
                qs("tryAgainBtn").style.display = "block";
                setBusy(false);
                showError(body.failure_reason || body.display_message || "Payment failed.");
                return;
            }

            if(body.next_action === "enter_otp" || body.next_action === "enter_phone" || body.next_action === "enter_pin" || body.next_action === "enter_birthday" || body.next_action === "enter_address"){
                qs("waitBox").style.display = "none";
                renderFollowup(body.next_action);
                qs("tryAgainBtn").style.display = "none";
                stopPolling();
                return;
            }

            qs("followupForm").style.display = "none";
            if(body.next_action === "wait"){
                qs("waitText").textContent = body.display_message || "Waiting for payment confirmation...";
                qs("waitBox").style.display = "block";
                qs("tryAgainBtn").style.display = "none";
                startPolling();
                return;
            }

            if(body.next_action === "open_url"){
                if(body.redirect_url){
                    window.location.href = body.redirect_url;
                    return;
                }
                qs("waitBox").style.display = "none";
                qs("tryAgainBtn").style.display = "block";
                showError(body.display_message || "This payment requires an external authorization flow, which is not supported here.");
                stopPolling();
                return;
            }

            qs("waitBox").style.display = "none";
            qs("tryAgainBtn").style.display = "block";
        }
        function fetchStatus(){
            if(!internalReference) return;
            fetch("/portal/payment-status?ref=" + encodeURIComponent(internalReference), { headers: { "Accept":"application/json" } })
                .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, status:r.status, body:j }; }); })
                .then(function(res){
                    if(!res.ok){ return; }
                    handleState(res.body);
                })
                .catch(function(){});
        }

        fetch("/portal/plans?site_id="+encodeURIComponent(siteId)+"&gateway="+encodeURIComponent(gateway)+(rt?("&rt="+encodeURIComponent(rt)):""), { headers: { "Accept":"application/json" } })
            .then(function(r){ if(!r.ok) throw new Error("plans_http_"+r.status); return r.json(); })
            .then(renderPlan)
            .catch(function(){
                qs("planLoading").textContent="Unable to load plan. Please go back and try again.";
                showError("Unable to load plan details.");
            });

        qs("payForm").addEventListener("submit", function(ev){
            ev.preventDefault();
            clearError();
            if(!selectedPlan){ showError("Plan not loaded yet."); return; }
            var phone = (qs("phone").value||"").trim();
            var method = selectedMethod();
            setBusy(true);
            qs("followupForm").style.display = "none";
            qs("waitBox").style.display = "none";
            qs("tryAgainBtn").style.display = "none";
            fetch("/portal/initiate-payment", {
                method: "POST",
                headers: { "Content-Type":"application/json", "Accept":"application/json" },
                body: JSON.stringify({ plan_id: planId, site_id: siteId, gateway: gateway, rt: rt, phone: phone, payment_method: method })
            })
            .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, status:r.status, body:j }; }); })
            .then(function(res){
                if(!res.ok){
                    setBusy(false);
                    qs("tryAgainBtn").style.display = "block";
                    showError((res.body && res.body.detail) ? res.body.detail : "Payment initiation failed.");
                    return;
                }
                internalReference = res.body.internal_reference;
                handleState(res.body);
            })
            .catch(function(){
                setBusy(false);
                qs("tryAgainBtn").style.display = "block";
                showError("Network error. Please try again.");
            });
        });

        var methodRadios = document.querySelectorAll('input[name="method"]');
        for(var i=0;i<methodRadios.length;i++) methodRadios[i].addEventListener("change", syncPhoneRequirement);
        syncPhoneRequirement();

        qs("followupForm").addEventListener("submit", function(ev){
            ev.preventDefault();
            if(!internalReference){ showError("Payment session expired. Please start again."); return; }
            clearError();
            var body = { ref: internalReference };
            var form = ev.target;
            var fields = form.querySelectorAll("input");
            for(var i=0;i<fields.length;i++){
                body[fields[i].name] = fields[i].value;
            }
            fetch("/portal/continue-payment", {
                method: "POST",
                headers: { "Content-Type":"application/json", "Accept":"application/json" },
                body: JSON.stringify(body)
            })
            .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, status:r.status, body:j }; }); })
            .then(function(res){
                if(!res.ok){
                    showError((res.body && res.body.detail) ? res.body.detail : "Unable to continue payment.");
                    return;
                }
                handleState(res.body);
            })
            .catch(function(){
                showError("Network error. Please try again.");
            });
        });

        qs("tryAgainBtn").addEventListener("click", resetState);
    })();
    </script>
</body>
</html>
