<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platform Settings — Platform Admin</title>
  <link rel="stylesheet" href="/platform/statics/app.css">
  <style>
    #toast{position:fixed;top:20px;right:20px;z-index:1000;padding:12px 18px;border-radius:10px;
      border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.16);color:#bbf7d0;font-size:14px;
      font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);opacity:0;transform:translateY(-8px);
      transition:opacity .2s,transform .2s;pointer-events:none}
    #toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <span class="brand">Platform <span>Admin</span></span>
    <div class="links">
      <a href="/platform/operators" class="btn">← Operators</a>
      <button class="btn" id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="section-title">Platform Settings</div>
  <p class="section-sub">Platform-level configuration. Operators never see or set these — the WireGuard endpoint is what their routers dial.</p>

  <div class="card" style="max-width:600px">
    <div id="msg" class="notice bad" style="display:none;margin-bottom:16px"></div>

    <form id="form" novalidate>
      <label>WireGuard Endpoint</label>
      <input id="wg_server_endpoint" type="text" placeholder="34.122.11.114:51820" autocomplete="off">

      <label>Platform App URL</label>
      <input id="platform_app_url" type="text" placeholder="https://app.yourplatform.com" autocomplete="off">

      <label>Webhook Base URL</label>
      <input id="webhook_base_url" type="text" placeholder="https://app.yourplatform.com" autocomplete="off">

      <div class="spacer"></div>
      <div style="display:flex;gap:10px">
        <button class="btn primary" type="submit" id="save-btn">Save changes</button>
        <a href="/platform/operators" class="btn">Cancel</a>
      </div>
    </form>
  </div>

  <div id="loading" style="text-align:center;padding:60px 0;color:var(--muted)">Loading…</div>
</div>

<div id="toast">Settings saved</div>

<script>
const KEYS = ['wg_server_endpoint', 'platform_app_url', 'webhook_base_url'];

const token = localStorage.getItem('platform_access_token');
if (!token) { window.location.replace('/platform/login'); }

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('platform_access_token');
  localStorage.removeItem('platform_refresh_token');
  window.location.href = '/platform/login';
});

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + localStorage.getItem('platform_access_token'),
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) {
    localStorage.removeItem('platform_access_token');
    window.location.replace('/platform/login');
    throw new Error('Unauthorized');
  }
  return res;
}

function showError(text) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'notice bad';
  msg.style.display = 'block';
}

function hideError() {
  document.getElementById('msg').style.display = 'none';
}

let toastTimer = null;
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function fill(settings) {
  KEYS.forEach(k => { document.getElementById(k).value = settings[k] || ''; });
}

async function load() {
  try {
    const res = await api('/api/v1/platform/settings');
    if (!res.ok) throw new Error('Failed to load');
    fill(await res.json());
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').textContent = 'Failed to load settings. Check your session.';
  }
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  hideError();
  const btn = document.getElementById('save-btn');
  const updates = {};
  KEYS.forEach(k => { updates[k] = document.getElementById(k).value.trim(); });

  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const res = await api('/api/v1/platform/settings', { method: 'PUT', body: JSON.stringify(updates) });
    const data = await res.json();
    if (!res.ok) {
      showError(data.detail || 'Failed to save settings.');
    } else {
      fill(data);
      showToast('Settings saved');
    }
  } catch (e) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save changes';
  }
});

load();
</script>
</body>
</html>
