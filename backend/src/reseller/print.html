<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Print vouchers</title>
    <link rel="stylesheet" href="/reseller/statics/app.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav no-print">
        <div class="muted">Print page</div>
        <div class="links">
          <button class="btn primary" onclick="window.print()">Print</button>
          <a class="btn" href="/reseller/vouchers">Back</a>
        </div>
      </div>

      <div class="card no-print">
        <h1 class="h1">Voucher codes</h1>
        <div class="muted">Only codes will appear on paper.</div>
      </div>

      <div class="spacer"></div>
      <div id="grid" class="print-grid"></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const codes = (params.get("codes") || "").split(",").map(s => s.trim()).filter(Boolean);
      const grid = document.getElementById("grid");
      grid.innerHTML = codes.map(c => `<div class="print-code">${c}</div>`).join("");
    </script>
  </body>
</html>
