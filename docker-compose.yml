services:
  redis:
    image: redis:7-alpine
    container_name: hotspot-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    container_name: hotspot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotspot_user} -d ${POSTGRES_DB:-hotspot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hotspot-backend
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        alembic upgrade head
        if [ "$$RUN_SEED" = "true" ]; then
          python -m src.db.seeds.seed
        fi
        exec uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@pgbouncer:5432/${POSTGRES_DB:-hotspot_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@pgbouncer:5432/${POSTGRES_DB:-hotspot_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      RADIUS_COA_SECRET: ${RADIUS_COA_SECRET:-radius_secret_123}
      RADIUS_ACCOUNTING_SECRET: ${RADIUS_ACCOUNTING_SECRET:-acct_secret_123}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-NlvUlJ_LybSPZa-4oH0BjQHNM1yuNAw2Nn1CnyZ9Z8Q=}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@isp.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      RUN_SEED: ${RUN_SEED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MTN_MOMO_BASE_URL: ${MTN_MOMO_BASE_URL:-}
      MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY: ${MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY:-}
      MTN_MOMO_API_USER: ${MTN_MOMO_API_USER:-}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY:-}
      MTN_MOMO_ENVIRONMENT: ${MTN_MOMO_ENVIRONMENT:-sandbox}
      VODAFONE_CASH_BASE_URL: ${VODAFONE_CASH_BASE_URL:-}
      VODAFONE_CASH_MERCHANT_ID: ${VODAFONE_CASH_MERCHANT_ID:-}
      VODAFONE_CASH_API_KEY: ${VODAFONE_CASH_API_KEY:-}
      VODAFONE_CASH_CALLBACK_URL: ${VODAFONE_CASH_CALLBACK_URL:-}
      AIRTELTIGO_BASE_URL: ${AIRTELTIGO_BASE_URL:-}
      AIRTELTIGO_CLIENT_ID: ${AIRTELTIGO_CLIENT_ID:-}
      AIRTELTIGO_CLIENT_SECRET: ${AIRTELTIGO_CLIENT_SECRET:-}
      AIRTELTIGO_CALLBACK_URL: ${AIRTELTIGO_CALLBACK_URL:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      HUBTEL_CLIENT_ID: ${HUBTEL_CLIENT_ID:-}
      HUBTEL_CLIENT_SECRET: ${HUBTEL_CLIENT_SECRET:-}
      HUBTEL_FROM: ${HUBTEL_FROM:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_FROM: ${AFRICASTALKING_FROM:-}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RADIUS_PUBLIC_HOST: ${RADIUS_PUBLIC_HOST:-}
      MIKROTIK_API_TIMEOUT: ${MIKROTIK_API_TIMEOUT:-10}
      MIKROTIK_CMD_TIMEOUT: ${MIKROTIK_CMD_TIMEOUT:-30}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend/admin:/frontend/admin
      - ./portal:/portal
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build: ./backend
    container_name: hotspot-worker
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        exec arq src.jobs.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@pgbouncer:5432/${POSTGRES_DB:-hotspot_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@pgbouncer:5432/${POSTGRES_DB:-hotspot_db}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-NlvUlJ_LybSPZa-4oH0BjQHNM1yuNAw2Nn1CnyZ9Z8Q=}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MTN_MOMO_BASE_URL: ${MTN_MOMO_BASE_URL:-}
      MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY: ${MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY:-}
      MTN_MOMO_API_USER: ${MTN_MOMO_API_USER:-}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY:-}
      MTN_MOMO_ENVIRONMENT: ${MTN_MOMO_ENVIRONMENT:-sandbox}
      VODAFONE_CASH_BASE_URL: ${VODAFONE_CASH_BASE_URL:-}
      VODAFONE_CASH_MERCHANT_ID: ${VODAFONE_CASH_MERCHANT_ID:-}
      VODAFONE_CASH_API_KEY: ${VODAFONE_CASH_API_KEY:-}
      VODAFONE_CASH_CALLBACK_URL: ${VODAFONE_CASH_CALLBACK_URL:-}
      AIRTELTIGO_BASE_URL: ${AIRTELTIGO_BASE_URL:-}
      AIRTELTIGO_CLIENT_ID: ${AIRTELTIGO_CLIENT_ID:-}
      AIRTELTIGO_CLIENT_SECRET: ${AIRTELTIGO_CLIENT_SECRET:-}
      AIRTELTIGO_CALLBACK_URL: ${AIRTELTIGO_CALLBACK_URL:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      HUBTEL_CLIENT_ID: ${HUBTEL_CLIENT_ID:-}
      HUBTEL_CLIENT_SECRET: ${HUBTEL_CLIENT_SECRET:-}
      HUBTEL_FROM: ${HUBTEL_FROM:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_FROM: ${AFRICASTALKING_FROM:-}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RADIUS_PUBLIC_HOST: ${RADIUS_PUBLIC_HOST:-}
      MIKROTIK_API_TIMEOUT: ${MIKROTIK_API_TIMEOUT:-10}
      MIKROTIK_CMD_TIMEOUT: ${MIKROTIK_CMD_TIMEOUT:-30}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

  # Privileged sidecar that manages WireGuard peers on the host wg0 interface.
  # Uses host networking so `wg` talks to the real kernel interface, and binds
  # its HTTP API to 127.0.0.1:8999 only (never exposed externally).
  wg-manager:
    image: python:3.11-slim
    container_name: hotspot-wg-manager
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_MANAGER_HOST: 127.0.0.1
      WG_MANAGER_PORT: 8999
      WG_HANDSHAKE_TIMEOUT: 180
    volumes:
      - ./scripts/wg_manager.py:/app/wg_manager.py:ro
      - /etc/wireguard:/etc/wireguard
    command:
      - sh
      - -c
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends wireguard-tools iproute2
        exec python3 /app/wg_manager.py
    restart: unless-stopped

  freeradius:
    image: freeradius/freeradius-server:3.2.6
    container_name: hotspot-freeradius
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        ln -sf /etc/freeradius/mods-available/sql /etc/freeradius/mods-enabled/sql
        cp /overrides/sql.conf /etc/freeradius/mods-enabled/sql
        cp /overrides/default /etc/freeradius/sites-enabled/default
        cp /overrides/clients.conf /etc/freeradius/clients.conf
        chmod 640 /etc/freeradius/mods-enabled/sql /etc/freeradius/sites-enabled/default /etc/freeradius/clients.conf
        exec /docker-entrypoint.sh freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/sql.conf:/overrides/sql.conf:ro
      - ./freeradius/sites-enabled/default:/overrides/default:ro
      - ./freeradius/clients.conf:/overrides/clients.conf:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof freeradius >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  freeradius-secondary:
    image: freeradius/freeradius-server:3.2.6
    container_name: hotspot-freeradius-secondary
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        ln -sf /etc/freeradius/mods-available/sql /etc/freeradius/mods-enabled/sql
        cp /overrides/sql.conf /etc/freeradius/mods-enabled/sql
        cp /overrides/default /etc/freeradius/sites-enabled/default
        cp /overrides/clients.conf /etc/freeradius/clients.conf
        chmod 640 /etc/freeradius/mods-enabled/sql /etc/freeradius/sites-enabled/default /etc/freeradius/clients.conf
        exec /docker-entrypoint.sh freeradius
    ports:
      - "2812:1812/udp"
      - "2813:1813/udp"
    volumes:
      - ./freeradius/sql.conf:/overrides/sql.conf:ro
      - ./freeradius/sites-enabled/default:/overrides/default:ro
      - ./freeradius/clients.conf:/overrides/clients.conf:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof freeradius >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: hotspot-pgbouncer
    environment:
      DB_USER: ${POSTGRES_USER:-hotspot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hotspot_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    build: ./backup
    container_name: hotspot-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  backups:
