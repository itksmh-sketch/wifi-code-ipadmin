services:
  redis:
    image: redis:7-alpine
    container_name: hotspot-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    container_name: hotspot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotspot_user} -d ${POSTGRES_DB:-hotspot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hotspot-backend
    # Host networking so the backend shares the host loopback with wg-manager
    # (reaches it at 127.0.0.1:8999). DB/Redis are reached via 127.0.0.1 + their
    # published host ports, since Docker service-name DNS is unavailable here.
    network_mode: host
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        alembic upgrade head
        if [ "$$RUN_SEED" = "true" ]; then
          python -m src.db.seeds.seed
        fi
        exec uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@127.0.0.1:6432/${POSTGRES_DB:-hotspot_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@127.0.0.1:6432/${POSTGRES_DB:-hotspot_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      RADIUS_COA_SECRET: ${RADIUS_COA_SECRET:-radius_secret_123}
      RADIUS_ACCOUNTING_SECRET: ${RADIUS_ACCOUNTING_SECRET:-acct_secret_123}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-NlvUlJ_LybSPZa-4oH0BjQHNM1yuNAw2Nn1CnyZ9Z8Q=}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@isp.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      RUN_SEED: ${RUN_SEED:-false}
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379}
      MTN_MOMO_BASE_URL: ${MTN_MOMO_BASE_URL:-}
      MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY: ${MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY:-}
      MTN_MOMO_API_USER: ${MTN_MOMO_API_USER:-}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY:-}
      MTN_MOMO_ENVIRONMENT: ${MTN_MOMO_ENVIRONMENT:-sandbox}
      VODAFONE_CASH_BASE_URL: ${VODAFONE_CASH_BASE_URL:-}
      VODAFONE_CASH_MERCHANT_ID: ${VODAFONE_CASH_MERCHANT_ID:-}
      VODAFONE_CASH_API_KEY: ${VODAFONE_CASH_API_KEY:-}
      VODAFONE_CASH_CALLBACK_URL: ${VODAFONE_CASH_CALLBACK_URL:-}
      AIRTELTIGO_BASE_URL: ${AIRTELTIGO_BASE_URL:-}
      AIRTELTIGO_CLIENT_ID: ${AIRTELTIGO_CLIENT_ID:-}
      AIRTELTIGO_CLIENT_SECRET: ${AIRTELTIGO_CLIENT_SECRET:-}
      AIRTELTIGO_CALLBACK_URL: ${AIRTELTIGO_CALLBACK_URL:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      HUBTEL_CLIENT_ID: ${HUBTEL_CLIENT_ID:-}
      HUBTEL_CLIENT_SECRET: ${HUBTEL_CLIENT_SECRET:-}
      HUBTEL_FROM: ${HUBTEL_FROM:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_FROM: ${AFRICASTALKING_FROM:-}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RADIUS_PUBLIC_HOST: ${RADIUS_PUBLIC_HOST:-}
      MIKROTIK_API_TIMEOUT: ${MIKROTIK_API_TIMEOUT:-10}
      MIKROTIK_CMD_TIMEOUT: ${MIKROTIK_CMD_TIMEOUT:-30}
      # Reseller / platform-owner auth
      RESELLER_JWT_SECRET: ${RESELLER_JWT_SECRET:-change_me_reseller_in_production}
      RESELLER_JWT_EXPIRATION_MINUTES: ${RESELLER_JWT_EXPIRATION_MINUTES:-60}
      PLATFORM_OWNER_JWT_SECRET: ${PLATFORM_OWNER_JWT_SECRET:-change_me_platform_owner_in_production}
      PLATFORM_OWNER_JWT_EXPIRATION_MINUTES: ${PLATFORM_OWNER_JWT_EXPIRATION_MINUTES:-60}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-owner@yourdomain.com}
      PLATFORM_OWNER_PASSWORD: ${PLATFORM_OWNER_PASSWORD:-change-me-strong-password}
      # Public URLs
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      PORTAL_PUBLIC_BASE_URL: ${PORTAL_PUBLIC_BASE_URL:-}
      PLATFORM_APP_URL: ${PLATFORM_APP_URL:-http://localhost:8000}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@yourplatform.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-YourISP Platform}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM_EMAIL: ${MAILGUN_FROM_EMAIL:-}
      PLATFORM_SUPPORT_EMAIL: ${PLATFORM_SUPPORT_EMAIL:-support@yourplatform.com}
      # Platform billing
      PLATFORM_BILLING_PAYSTACK_PUBLIC_KEY: ${PLATFORM_BILLING_PAYSTACK_PUBLIC_KEY:-}
      PLATFORM_BILLING_PAYSTACK_SECRET_KEY: ${PLATFORM_BILLING_PAYSTACK_SECRET_KEY:-}
      PLATFORM_BILLING_PAYSTACK_WEBHOOK_SECRET: ${PLATFORM_BILLING_PAYSTACK_WEBHOOK_SECRET:-}
      DEFAULT_MONTHLY_FEE_GHS: ${DEFAULT_MONTHLY_FEE_GHS:-200.00}
      TRIAL_DAYS: ${TRIAL_DAYS:-14}
      GRACE_PERIOD_DAYS: ${GRACE_PERIOD_DAYS:-14}
      # WireGuard VPN tunnel
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY:-}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY:-}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT:-34.122.11.114:51820}
      WG_TUNNEL_NETWORK: ${WG_TUNNEL_NETWORK:-10.100.0.0/24}
      WG_SERVER_TUNNEL_IP: ${WG_SERVER_TUNNEL_IP:-10.100.0.1}
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_MANAGER_URL: ${WG_MANAGER_URL:-http://127.0.0.1:8999}
    # No `ports:` — host networking ignores port mappings; uvicorn binds
    # 0.0.0.0:8000 directly on the host (Nginx proxies to 127.0.0.1:8000).
    volumes:
      - ./backend:/app
      - ./frontend/admin:/frontend/admin
      - ./portal:/portal
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build: ./backend
    container_name: hotspot-worker
    # Host networking so the worker can reach wg-manager at 127.0.0.1:8999
    # (tunnel-status job). DB/Redis via 127.0.0.1 + published host ports.
    network_mode: host
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        exec arq src.jobs.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@127.0.0.1:6432/${POSTGRES_DB:-hotspot_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-hotspot_user}:${POSTGRES_PASSWORD:-hotspot_pass}@127.0.0.1:6432/${POSTGRES_DB:-hotspot_db}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-NlvUlJ_LybSPZa-4oH0BjQHNM1yuNAw2Nn1CnyZ9Z8Q=}
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379}
      MTN_MOMO_BASE_URL: ${MTN_MOMO_BASE_URL:-}
      MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY: ${MTN_MOMO_COLLECTION_SUBSCRIPTION_KEY:-}
      MTN_MOMO_API_USER: ${MTN_MOMO_API_USER:-}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY:-}
      MTN_MOMO_ENVIRONMENT: ${MTN_MOMO_ENVIRONMENT:-sandbox}
      VODAFONE_CASH_BASE_URL: ${VODAFONE_CASH_BASE_URL:-}
      VODAFONE_CASH_MERCHANT_ID: ${VODAFONE_CASH_MERCHANT_ID:-}
      VODAFONE_CASH_API_KEY: ${VODAFONE_CASH_API_KEY:-}
      VODAFONE_CASH_CALLBACK_URL: ${VODAFONE_CASH_CALLBACK_URL:-}
      AIRTELTIGO_BASE_URL: ${AIRTELTIGO_BASE_URL:-}
      AIRTELTIGO_CLIENT_ID: ${AIRTELTIGO_CLIENT_ID:-}
      AIRTELTIGO_CLIENT_SECRET: ${AIRTELTIGO_CLIENT_SECRET:-}
      AIRTELTIGO_CALLBACK_URL: ${AIRTELTIGO_CALLBACK_URL:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      HUBTEL_CLIENT_ID: ${HUBTEL_CLIENT_ID:-}
      HUBTEL_CLIENT_SECRET: ${HUBTEL_CLIENT_SECRET:-}
      HUBTEL_FROM: ${HUBTEL_FROM:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_FROM: ${AFRICASTALKING_FROM:-}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RADIUS_PUBLIC_HOST: ${RADIUS_PUBLIC_HOST:-}
      MIKROTIK_API_TIMEOUT: ${MIKROTIK_API_TIMEOUT:-10}
      MIKROTIK_CMD_TIMEOUT: ${MIKROTIK_CMD_TIMEOUT:-30}
      # Reseller / platform-owner auth
      RESELLER_JWT_SECRET: ${RESELLER_JWT_SECRET:-change_me_reseller_in_production}
      RESELLER_JWT_EXPIRATION_MINUTES: ${RESELLER_JWT_EXPIRATION_MINUTES:-60}
      PLATFORM_OWNER_JWT_SECRET: ${PLATFORM_OWNER_JWT_SECRET:-change_me_platform_owner_in_production}
      PLATFORM_OWNER_JWT_EXPIRATION_MINUTES: ${PLATFORM_OWNER_JWT_EXPIRATION_MINUTES:-60}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-owner@yourdomain.com}
      PLATFORM_OWNER_PASSWORD: ${PLATFORM_OWNER_PASSWORD:-change-me-strong-password}
      # Public URLs
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      PORTAL_PUBLIC_BASE_URL: ${PORTAL_PUBLIC_BASE_URL:-}
      PLATFORM_APP_URL: ${PLATFORM_APP_URL:-http://localhost:8000}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@yourplatform.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-YourISP Platform}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM_EMAIL: ${MAILGUN_FROM_EMAIL:-}
      PLATFORM_SUPPORT_EMAIL: ${PLATFORM_SUPPORT_EMAIL:-support@yourplatform.com}
      # Platform billing
      PLATFORM_BILLING_PAYSTACK_PUBLIC_KEY: ${PLATFORM_BILLING_PAYSTACK_PUBLIC_KEY:-}
      PLATFORM_BILLING_PAYSTACK_SECRET_KEY: ${PLATFORM_BILLING_PAYSTACK_SECRET_KEY:-}
      PLATFORM_BILLING_PAYSTACK_WEBHOOK_SECRET: ${PLATFORM_BILLING_PAYSTACK_WEBHOOK_SECRET:-}
      DEFAULT_MONTHLY_FEE_GHS: ${DEFAULT_MONTHLY_FEE_GHS:-200.00}
      TRIAL_DAYS: ${TRIAL_DAYS:-14}
      GRACE_PERIOD_DAYS: ${GRACE_PERIOD_DAYS:-14}
      # WireGuard VPN tunnel
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY:-}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY:-}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT:-34.122.11.114:51820}
      WG_TUNNEL_NETWORK: ${WG_TUNNEL_NETWORK:-10.100.0.0/24}
      WG_SERVER_TUNNEL_IP: ${WG_SERVER_TUNNEL_IP:-10.100.0.1}
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_MANAGER_URL: ${WG_MANAGER_URL:-http://127.0.0.1:8999}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

  # Privileged sidecar that manages WireGuard peers on the host wg0 interface.
  # Uses host networking so `wg` talks to the real kernel interface, and binds
  # its HTTP API to 127.0.0.1:8999 only (never exposed externally).
  wg-manager:
    image: python:3.11-slim
    container_name: hotspot-wg-manager
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_MANAGER_HOST: 127.0.0.1
      WG_MANAGER_PORT: 8999
      WG_HANDSHAKE_TIMEOUT: 180
      WG_CMD_TIMEOUT: 15            # max seconds per wg/wg-quick command (prevents hangs)
      WG_PERSIST: 1                 # set 0 if `wg-quick save` misbehaves in-container
      PYTHONUNBUFFERED: 1           # ensure logs flush to `docker compose logs`
    volumes:
      - ./scripts/wg_manager.py:/app/wg_manager.py:ro
      - /etc/wireguard:/etc/wireguard
    command:
      - sh
      - -c
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends wireguard-tools iproute2
        exec python3 /app/wg_manager.py
    restart: unless-stopped

  freeradius:
    image: freeradius/freeradius-server:3.2.6
    container_name: hotspot-freeradius
    # PRIMARY runs on the host network so tunneled routers reach it at
    # 10.100.0.1:1812/1813 and FreeRADIUS sees their true 10.100.0.x source IPs
    # (under bridge + userland-proxy, UDP sources were masked as 172.x, defeating
    # per-router SQL clients). The listeners bind 0.0.0.0/* (shared config with
    # the bridge-networked secondary, so we must NOT pin to 10.100.0.1) — this
    # also exposes 1812/1813 on the VM's public interface, which MUST be closed
    # by a host firewall DROP on the public NIC (allow only wg0/10.100.0.0/24).
    network_mode: host
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        ln -sf /etc/freeradius/mods-available/sql /etc/freeradius/mods-enabled/sql
        cp /overrides/sql.conf /etc/freeradius/mods-enabled/sql
        # Host networking has no Docker DNS, so the service name "postgres" won't
        # resolve. Postgres publishes 5432 on the host, so reach it via loopback.
        # Rewrite only this container's copy — the shared override file (and the
        # bridge-networked secondary that still uses "postgres") are untouched.
        sed -i 's/host=postgres/host=127.0.0.1/' /etc/freeradius/mods-enabled/sql
        cp /overrides/default /etc/freeradius/sites-enabled/default
        cp /overrides/clients.conf /etc/freeradius/clients.conf
        chmod 640 /etc/freeradius/mods-enabled/sql /etc/freeradius/sites-enabled/default /etc/freeradius/clients.conf
        exec /docker-entrypoint.sh freeradius
    volumes:
      - ./freeradius/sql.conf:/overrides/sql.conf:ro
      - ./freeradius/sites-enabled/default:/overrides/default:ro
      - ./freeradius/clients.conf:/overrides/clients.conf:ro
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof freeradius >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  freeradius-secondary:
    image: freeradius/freeradius-server:3.2.6
    container_name: hotspot-freeradius-secondary
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        ln -sf /etc/freeradius/mods-available/sql /etc/freeradius/mods-enabled/sql
        cp /overrides/sql.conf /etc/freeradius/mods-enabled/sql
        cp /overrides/default /etc/freeradius/sites-enabled/default
        cp /overrides/clients.conf /etc/freeradius/clients.conf
        chmod 640 /etc/freeradius/mods-enabled/sql /etc/freeradius/sites-enabled/default /etc/freeradius/clients.conf
        exec /docker-entrypoint.sh freeradius
    ports:
      - "2812:1812/udp"
      - "2813:1813/udp"
    volumes:
      - ./freeradius/sql.conf:/overrides/sql.conf:ro
      - ./freeradius/sites-enabled/default:/overrides/default:ro
      - ./freeradius/clients.conf:/overrides/clients.conf:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof freeradius >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: hotspot-pgbouncer
    environment:
      DB_USER: ${POSTGRES_USER:-hotspot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hotspot_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    build: ./backup
    container_name: hotspot-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotspot_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotspot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotspot_pass}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  backups:
