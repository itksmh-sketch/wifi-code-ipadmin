services:
  postgres:
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotspot_user} -d ${POSTGRES_DB:-hotspot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    restart: unless-stopped
    mem_limit: 64m
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    restart: unless-stopped
    mem_limit: 256m
    command:
      - sh
      - -c
      - |
        set -e
        alembic upgrade head
        exec uvicorn src.app:app --host 0.0.0.0 --port 8000
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    restart: unless-stopped
    mem_limit: 256m
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h redis ping | grep PONG >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  freeradius:
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "radtest healthcheck password localhost 0 testing123 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  freeradius-secondary:
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "radtest healthcheck password localhost 0 testing123 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  backup:
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "pgrep supercronic >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
