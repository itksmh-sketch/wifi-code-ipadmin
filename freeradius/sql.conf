# FreeRADIUS SQL Configuration — PostgreSQL
# This module handles voucher authentication against the hotspot database

sql sql_hotspot {
    driver = "rlm_sql_postgresql"

    # Database connection
    dialect = "postgresql"
    radius_db = "host=postgres port=5432 dbname=hotspot_db user=hotspot_user password=hotspot_pass"
    sql_user_name = "%{User-Name}"

    # Connection pool
    num_sql_socks = 5
    connect_failure_retry_delay = 60
    max_queries = 0

    # =====================================================
    # AUTHORIZE QUERY
    # Looks up voucher by username, validates status,
    # returns bandwidth attributes and session timeout.
    # =====================================================
    authorize_check_query = "SELECT 1 AS id, '%{SQL-User-Name}' AS username, 'Cleartext-Password' AS attribute, v.password AS value, ':=' AS op FROM vouchers v JOIN plans p ON p.id = v.plan_id JOIN routers r ON r.nas_identifier = '%{NAS-Identifier}' WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') AND v.isp_operator_id = r.isp_operator_id AND p.isp_operator_id = r.isp_operator_id AND v.status IN ('unused', 'active') AND (v.expires_at IS NULL OR v.expires_at > NOW()) AND (p.data_limit_mb IS NULL OR v.data_used_mb < p.data_limit_mb) AND p.is_active = true LIMIT 1"

    authorize_reply_query = "SELECT 1 AS id, '%{SQL-User-Name}' AS username, 'Mikrotik-Rate-Limit' AS attribute, p.download_speed_kbps || 'k/' || p.upload_speed_kbps || 'k' AS value, ':=' AS op FROM vouchers v JOIN plans p ON v.plan_id = p.id JOIN routers r ON r.nas_identifier = '%{NAS-Identifier}' WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') AND v.isp_operator_id = r.isp_operator_id AND p.isp_operator_id = r.isp_operator_id AND p.is_active = true UNION SELECT 2 AS id, '%{SQL-User-Name}' AS username, 'WISPr-Bandwidth-Max-Down' AS attribute, p.download_speed_kbps::text AS value, ':=' AS op FROM vouchers v JOIN plans p ON v.plan_id = p.id JOIN routers r ON r.nas_identifier = '%{NAS-Identifier}' WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') AND v.isp_operator_id = r.isp_operator_id AND p.isp_operator_id = r.isp_operator_id AND p.is_active = true UNION SELECT 3 AS id, '%{SQL-User-Name}' AS username, 'WISPr-Bandwidth-Max-Up' AS attribute, p.upload_speed_kbps::text AS value, ':=' AS op FROM vouchers v JOIN plans p ON v.plan_id = p.id JOIN routers r ON r.nas_identifier = '%{NAS-Identifier}' WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') AND v.isp_operator_id = r.isp_operator_id AND p.isp_operator_id = r.isp_operator_id AND p.is_active = true UNION SELECT 4 AS id, '%{SQL-User-Name}' AS username, 'Session-Timeout' AS attribute, CASE WHEN v.expires_at IS NOT NULL THEN GREATEST(60, EXTRACT(EPOCH FROM (v.expires_at - NOW()))::integer)::text WHEN p.duration_minutes IS NOT NULL AND p.type IN ('time', 'hybrid') THEN (p.duration_minutes * 60)::text ELSE '86400' END AS value, ':=' AS op FROM vouchers v JOIN plans p ON v.plan_id = p.id JOIN routers r ON r.nas_identifier = '%{NAS-Identifier}' WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') AND v.isp_operator_id = r.isp_operator_id AND p.isp_operator_id = r.isp_operator_id AND p.is_active = true"

    accounting {
        reference = "%{tolower:type.%{%{Acct-Status-Type}:-none}.query}"

        type {
            accounting-on {
                query = "SELECT 1"
            }

            accounting-off {
                query = "SELECT 1"
            }

            start {
                query = "\
                  WITH activate AS ( \
                    UPDATE vouchers \
                    SET status = 'active', \
                        activated_at = NOW(), \
                        expires_at = CASE \
                          WHEN status = 'unused' AND expires_at IS NULL \
                          THEN (SELECT NOW() + (p.duration_minutes * INTERVAL '1 minute') \
                                FROM plans p \
                                JOIN vouchers v2 ON v2.plan_id = p.id \
                                JOIN routers r2 ON r2.nas_identifier = '%{NAS-Identifier}' \
                                WHERE (v2.code = '%{SQL-User-Name}' OR v2.username = '%{SQL-User-Name}') \
                                AND v2.isp_operator_id = r2.isp_operator_id \
                                AND p.isp_operator_id = r2.isp_operator_id \
                                AND p.duration_minutes IS NOT NULL \
                                LIMIT 1) \
                          ELSE expires_at \
                        END \
                    WHERE (code = '%{SQL-User-Name}' OR username = '%{SQL-User-Name}') \
                    AND status = 'unused' \
                    AND isp_operator_id = (SELECT isp_operator_id FROM routers WHERE nas_identifier = '%{NAS-Identifier}' LIMIT 1) \
                    RETURNING id \
                  ) \
                  INSERT INTO sessions ( \
                    id, isp_operator_id, voucher_id, router_id, username, \
                    mac_address, ip_address, nas_ip, session_id, \
                    started_at, upload_bytes, download_bytes \
                  ) \
                  SELECT \
                    gen_random_uuid(), \
                    v.isp_operator_id, \
                    v.id, \
                    r.id, \
                    '%{SQL-User-Name}', \
                    NULLIF(NULLIF('%{Calling-Station-Id}', ''), 'unknown')::macaddr, \
                    NULLIF('%{Framed-IP-Address}', '')::inet, \
                    '%{NAS-IP-Address}'::inet, \
                    '%{Acct-Session-Id}', \
                    NOW(), \
                    0, \
                    0 \
                  FROM vouchers v \
                  CROSS JOIN routers r \
                  WHERE (v.code = '%{SQL-User-Name}' OR v.username = '%{SQL-User-Name}') \
                  AND r.nas_identifier = '%{NAS-Identifier}' \
                  AND v.isp_operator_id = r.isp_operator_id \
                  ON CONFLICT (session_id) DO NOTHING"
            }

            interim-update {
                query = "WITH updated AS (UPDATE sessions SET upload_bytes = COALESCE(NULLIF('%{Acct-Input-Octets}', '')::bigint, 0), download_bytes = COALESCE(NULLIF('%{Acct-Output-Octets}', '')::bigint, 0) WHERE session_id = '%{Acct-Session-Id}' RETURNING session_id) SELECT update_voucher_usage(session_id) FROM updated"
            }

            stop {
                query = "WITH updated AS (UPDATE sessions SET stopped_at = NOW(), upload_bytes = COALESCE(NULLIF('%{Acct-Input-Octets}', '')::bigint, 0), download_bytes = COALESCE(NULLIF('%{Acct-Output-Octets}', '')::bigint, 0), terminate_cause = NULLIF('%{Acct-Terminate-Cause}', '') WHERE session_id = '%{Acct-Session-Id}' RETURNING session_id) SELECT update_voucher_usage(session_id) FROM updated"
            }
        }
    }

    # =====================================================
    # POST-AUTH QUERY
    # Log authentication attempts
    # =====================================================
    postauth_query = "SELECT 1"

    read_groups = no
    read_clients = no

    # Table mappings
    usergroup_table = "radusergroup"
}
