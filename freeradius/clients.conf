# FreeRADIUS Clients Configuration
# Each NAS (router) must be defined here to be allowed to send RADIUS packets.
# In production, this should be dynamically generated from the routers table.

# Local test client
client localhost {
    ipaddr = 127.0.0.1
    proto = *
    secret = testing123
    require_message_authenticator = yes
    shortname = "localhost"
}

# MikroTik router — Osu
client router_osu_01 {
    ipaddr = 192.168.10.1
    proto = *
    secret = testing123
    require_message_authenticator = yes
    shortname = "MikroTik-Osu"
    nas_type = "mikrotik"
}

# MikroTik router — East Legon
client router_eastlegon_01 {
    ipaddr = 192.168.20.1
    proto = *
    secret = testing123
    require_message_authenticator = yes
    shortname = "MikroTik-EastLegon"
    nas_type = "mikrotik"
}

# Docker network client (for radtest from host)
client docker_network {
    ipaddr = 172.16.0.0/12
    proto = *
    secret = testing123
    require_message_authenticator = yes
    shortname = "docker-network"
}

client mikrotik_chr_test {
    ipaddr = 192.168.56.20
    proto = *
    secret = mikrotik12
    require_message_authenticator = no
    shortname = "MikroTik-CHR-Test"
    nas_type = "mikrotik"
}