# FreeRADIUS Clients Configuration
#
# Only static entries that will never be in the routers table belong here.
# All MikroTik router clients are loaded dynamically from the database via
# the client_query in sql.conf (read_clients = yes).

client localhost {
    ipaddr = 127.0.0.1
    proto = *
    secret = testing123
    require_message_authenticator = no
    shortname = "localhost"
}

# CATCH-ALL fallback (rollback safety — do NOT remove yet).
#
# Covers radtest from the host/containers AND, under bridge networking with
# userland-proxy, router requests whose source IP is SNATed into 172.16/12. It
# uses a SHARED secret (testing123), so any router matching here is NOT being
# authenticated by its own per-router SQL client. The distinct shortname makes
# that obvious in `radiusd -X` and in the authorize log line (sites-enabled/
# default), so we can tell whether per-router SQL clients are actually in use.
# Removal is a separate task, only after live validation confirms every router
# authenticates via its own named SQL client.
client docker_network {
    ipaddr = 172.16.0.0/12
    proto = *
    secret = testing123
    require_message_authenticator = no
    shortname = "CATCHALL_docker_network"
}
