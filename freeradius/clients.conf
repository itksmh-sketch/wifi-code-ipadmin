# FreeRADIUS Clients Configuration
#
# Only static entries that will never be in the routers table belong here.
# All MikroTik router clients are loaded dynamically from the database via
# the client_query in sql.conf (read_clients = yes).

client localhost {
    ipaddr = 127.0.0.1
    proto = *
    secret = testing123
    require_message_authenticator = no
    shortname = "localhost"
}

# Docker / LAN range — covers radtest from the host or any container.
client docker_network {
    ipaddr = 172.16.0.0/12
    proto = *
    secret = testing123
    require_message_authenticator = no
    shortname = "docker-network"
}
