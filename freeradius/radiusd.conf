# FreeRADIUS Main Configuration
# This file includes the modular config

prefix = /etc/freeradius/3.0
exec_prefix = /etc/freeradius/3.0

log {
    destination = files
    file = ${logdir}/radius.log
    syslog_facility = daemon
}

security {
    allow_vulnerable_openssl = true
}

max_request_time = 30
cleanup_delay = 5
max_requests = 4096

listen {
    type = auth
    ipaddr = 0.0.0.0
    port = 0
}

listen {
    type = acct
    ipaddr = 0.0.0.0
    port = 0
}

listen {
    type = auth
    ipaddr = 0.0.0.0
    port = 0
    coa {
        enable = yes
    }
}

home_server_pool my_pool {
    type = fail-over
    home_server = localhost
}

home_server localhost {
    type = auth
    ipaddr = 127.0.0.1
    port = 1812
    secret = testing123
}

proxy server {
    retry_delay = 5
    retry_count = 3
    default_fallback = no
    dead_time = 30
}

$INCLUDE sql.conf
$INCLUDE clients.conf
$INCLUDE sites-enabled/
